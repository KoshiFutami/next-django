name: SchemaSpy

on:
  push:
    branches: [main]
    paths:
      - "backend/**/migrations/**/*.py"
      - ".github/workflows/schemaspy.yml"
  workflow_dispatch:

# GitHub Pages 公式例に合わせたデプロイ直列化
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: showcase
          POSTGRES_PASSWORD: showcase
          POSTGRES_DB: showcase
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U showcase -d showcase"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: showcase
      POSTGRES_USER: showcase
      POSTGRES_PASSWORD: showcase
      DJANGO_SECRET_KEY: ci-dummy-secret-not-for-production
      DJANGO_SETTINGS_MODULE: config.settings

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies and migrate
        working-directory: backend
        run: |
          pip install -r requirements.txt
          python manage.py migrate --noinput

      - name: Run SchemaSpy
        run: |
          mkdir -p docs/schemaspy
          docker run --rm \
            --add-host=host.docker.internal:host-gateway \
            -v "${GITHUB_WORKSPACE}/docs/schemaspy:/output" \
            schemaspy/schemaspy:7.0.2 \
            -vizjs \
            -t pgsql11 \
            -host host.docker.internal \
            -port 5432 \
            -db showcase \
            -u showcase \
            -p showcase \
            -s public

      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          path: docs/schemaspy

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # main へのマージ push でデプロイしたあと、関連 PR に GitHub Pages URL をコメント
  comment-pr:
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        with:
          script: |
            const pageUrl = process.env.PAGE_URL;
            if (!pageUrl) {
              core.info('page_url が空のためコメントをスキップします');
              return;
            }
            const { owner, repo } = context.repo;
            const before = context.payload.before;
            const after = context.payload.after;
            if (!before || before === '0000000000000000000000000000000000000000') {
              core.info('初回 push 等のためコミット比較をスキップします');
              return;
            }
            const { data: comparison } = await github.rest.repos.compareCommits({
              owner,
              repo,
              base: before,
              head: after,
            });
            const prNums = new Set();
            const mergeRe = /Merge pull request #(\d+)/i;
            const squashRe = /\(#(\d+)\)\s*$/m;
            for (const c of comparison.commits) {
              const msg = c.commit.message;
              let m = msg.match(mergeRe);
              if (m) prNums.add(parseInt(m[1], 10));
              m = msg.match(squashRe);
              if (m) prNums.add(parseInt(m[1], 10));
            }
            if (prNums.size === 0) {
              core.info('コミットメッセージから PR 番号が見つからなかったためコメントしません（直接 push など）');
              return;
            }
            const body = [
              '## SchemaSpy（DB スキーマ）',
              '',
              'GitHub Pages にデプロイしました。',
              '',
              pageUrl,
              '',
              'トップの `index.html` から ER 図・テーブル一覧を参照できます。',
            ].join('\n');
            for (const issue_number of prNums) {
              try {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
                core.info(`PR #${issue_number} にコメントしました`);
              } catch (e) {
                core.warning(`PR #${issue_number} へのコメントに失敗: ${e.message}`);
              }
            }
