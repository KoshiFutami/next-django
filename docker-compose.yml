services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: showcase
      POSTGRES_PASSWORD: showcase
      POSTGRES_DB: showcase
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U showcase -d showcase"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: showcase
      POSTGRES_USER: showcase
      POSTGRES_PASSWORD: showcase
      DJANGO_SETTINGS_MODULE: config.settings
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

  # DB スキーマ HTML（SchemaSpy）。`make schemaspy` または
  # `docker compose --profile tools run --rm schemaspy`
  schemaspy:
    image: schemaspy/schemaspy:7.0.2
    profiles: ["tools"]
    # バインドマウント ./docs/schemaspy にデフォルトユーザーでは書けない環境があるため
    user: "0:0"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./docs/schemaspy:/output
    command:
      - "-vizjs"
      - "-t"
      - "pgsql11"
      - "-host"
      - "db"
      - "-port"
      - "5432"
      - "-db"
      - "showcase"
      - "-u"
      - "showcase"
      - "-p"
      - "showcase"
      - "-s"
      - "public"

volumes:
  postgres_data:
  frontend_node_modules:
